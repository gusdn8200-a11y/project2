<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wallD | 페이지를 찾을 수 없습니다</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050608;
        color: #f3f4f6;
        font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic",
          "Helvetica Neue", sans-serif;
      }

      main {
        width: min(760px, calc(100% - 2rem));
        display: grid;
        gap: 0.8rem;
        line-height: 1.65;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 4vw, 2.3rem);
      }

      p {
        margin: 0;
        color: #d0d8e2;
      }

      a {
        color: #eff3f8;
      }

      ul {
        margin: 0;
        padding-left: 1.1rem;
      }
    </style>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;

        var routePath = location.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~');

        var query = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';

        var redirectPath =
          location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          routePath +
          query +
          location.hash;

        location.replace(
          location.protocol +
            '//' +
            location.hostname +
            (location.port ? ':' + location.port : '') +
            redirectPath,
        );
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>요청한 페이지를 찾을 수 없습니다.</h1>
      <p>주소를 확인하는 동안 wallD 메인 페이지로 이동합니다.</p>
      <ul>
        <li>프로젝트 설명: wallD 벽면 광고/아트 포트폴리오</li>
        <li>프로젝트 링크: <a href="/project2/">/project2/</a></li>
        <li>문의 이메일: <a href="mailto:leonardo@wall-d.com">leonardo@wall-d.com</a></li>
      </ul>
      <p><a href="/project2/">자동 이동이 안 되면 여기를 클릭하세요.</a></p>
    </main>
    <noscript>
      JavaScript가 비활성화되어 자동 이동을 사용할 수 없습니다.
      <a href="/project2/">/project2/</a>로 직접 이동해주세요.
    </noscript>
  </body>
</html>
